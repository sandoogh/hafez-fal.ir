  <main class="ghazal">
    <h1>{ghazal_title}</h1>
    <div class="poem">
{mesra_html}
    </div>
    <details class="tafsir">
      <summary>نمایش تفسیر</summary>
      <p>{body}</p>
    </details>
    <div class="ghazal-nav">
      <div class="nav-right">{prev_link}</div>
      <div class="nav-center"><a href="#" onclick="getRandomGhazal(); return false;">فال دیگر</a></div>
      <div class="nav-left">{next_link}</div>
    </div>
  </main>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Poem",
    "name": "{ghazal_title}",
    "author": { "@type": "Person", "name": "حافظ شیرازی" },
    "inLanguage": "fa",
    "text": "{first_verse}"
  }
  </script>
  <script>
    function getRandomGhazal() {
      var num = Math.floor(Math.random() * {total}) + 1;
      var formatted = ('000' + num).slice(-3);
      window.location.href = '/ghazal/' + formatted + '/';
    }
  </script>
