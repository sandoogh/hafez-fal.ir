<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{title}</title>
  <meta name="description" content="{description}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{title}">
  <meta property="og:description" content="{description}">
  <meta property="og:url" content="{url}">
  <meta property="og:site_name" content="فال حافظ">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{title}">
  <meta name="twitter:description" content="{description}">
  <link rel="icon" href="/static/img/icon.png">
  <link rel="apple-touch-icon" href="/static/img/icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#288689">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <header>
    <nav>
      <a href="/">خانه</a>
      <a href="/list/">فهرست غزل‌ها</a>
      <a href="/about/">درباره</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="تغییر تم"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 2a10 10 0 0 1 0 20V2z"/></svg></button>
    </nav>
  </header>

  {content}

  <footer>
    <p>ساخته شده توسط کیاوش و محمدحسین</p>
  </footer>

  <script>
    function toggleTheme() {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? '' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
